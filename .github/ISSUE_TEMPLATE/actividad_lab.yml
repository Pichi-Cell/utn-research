name: 🔬 Actividad de laboratorio
description: Registro de una actividad operativa del lab (medición, ensayo, reunión, etc.)
title: "actividad: <descripción corta>"
labels: ["actividad-lab"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Usá este template para registrar actividades del laboratorio que no pertenecen a algún proyecto en particular.

  - type: dropdown
    id: tipo
    attributes:
      label: Tipo de actividad
      options:
        - Administrativa
        - Reunión
        - Capacitación
        - Documentación
        - Relevamiento / Inventario
        - Desarrollo
        - Otro
    validations:
      required: true

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción de la actividad
      description: ¿Qué se va a hacer?
    validations:
      required: true
